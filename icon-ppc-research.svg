<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#23282d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d3d3d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Circle background -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#faa523" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Cursor/click icon — centered and fully contained -->
  <path d="M75 45 L75 95 L89 83 L103 83 Z" fill="#faa523" opacity="0.9"/>
  <path d="M89 83 L100 110" fill="none" stroke="#faa523" stroke-width="5" stroke-linecap="round"/>
  <!-- Click ripple rings around cursor tip -->
  <circle cx="75" cy="45" r="10" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="75" cy="45" r="18" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Dollar signs floating -->
  <text x="120" y="62" font-family="'Nunito Sans', Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff" opacity="0.7">$</text>
  <text x="138" y="82" font-family="'Nunito Sans', Arial, sans-serif" font-weight="700" font-size="16" fill="#ffffff" opacity="0.5">$</text>
  <text x="113" y="42" font-family="'Nunito Sans', Arial, sans-serif" font-weight="700" font-size="13" fill="#ffffff" opacity="0.4">$</text>
  <!-- Target/bullseye -->
  <circle cx="135" cy="108" r="18" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <circle cx="135" cy="108" r="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <circle cx="135" cy="108" r="3" fill="#faa523"/>
  <!-- Label -->
  <text x="100" y="158" text-anchor="middle" font-family="'Nunito Sans', Arial, sans-serif" font-weight="700" font-size="18" fill="#faa523" letter-spacing="2">PPC</text>
</svg>
